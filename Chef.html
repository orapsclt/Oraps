<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chef du culte</title>

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    padding: 40px;
}

/* Lignes cachées */
.line {
    opacity: 0;
    margin-bottom: 12px;
    transition: opacity 0.8s;
}

/* Titre */
h1 {
    color: #f44;
    margin-bottom: 30px;
}

/* IMAGE visible direct */
img {
    display: block;
    margin-bottom: 30px;
    max-width: 300px;
    border: 1px solid #800;
}

/* Curseur */
.cursor::after {
    content: "_";
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}
</style>
</head>

<body>

<h1 class="cursor">Accès : Créatrice</h1>

<!-- IMAGE visible dès le début -->
<img src="chef.png" alt="Chef du culte">

<div id="content">
    <div class="line">Connexion au noyau central...</div>
    <div class="line">Vérification des accès...</div>
    <div class="line">Autorisation confirmée.</div>
    <div class="line">---</div>
    <div class="line">Nom : Inès</div>
    <div class="line">pseudo : edwin</div>
    <div class="line">Genre : Féminin</div>
    <div class="line">Rôle : Créatrice</div>
    <div class="line">Statut : Active</div>
    <div class="line">---</div>
    <div class="line">Elle observe.</div>
    <div class="line">Toujours.</div>
</div>

<script>
const lines = document.querySelectorAll(".line");

lines.forEach((line, index) => {
    setTimeout(() => {
        line.style.opacity = 1;
    }, index * 1200);
});
</script>

</body>
</html>
