<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chef du culte</title>

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    padding: 40px;
}

/* Lignes */
.line {
    opacity: 0;
    margin-bottom: 12px;
    transition: opacity 0.8s;
}

/* Titre */
h1 {
    color: #f44;
    margin-bottom: 30px;
}

/* IMAGE cachée au début */
img {
    display: block;
    margin-top: 30px;
    max-width: 300px;
    border: 1px solid #800;
    opacity: 0;
    transition: opacity 1.5s;
}

/* Curseur */
.cursor::after {
    content: "_";
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}
</style>
</head>

<body>

<h1 class="cursor">Accès : Créatrice</h1>

<div id="content">
    <div class="line">Connexion au noyau central...</div>
    <div class="line">Vérification des accès...</div>
    <div class="line">Autorisation confirmée.</div>
    <div class="line">---</div>
    <div class="line">Nom : inès</div>
    <div class="line">pseudo : edwin</div>
    <div class="line">Genre : Féminin</div>
    <div class="line">Rôle : chef du culte</div>
    <div class="line">Statut : Active</div>
    <div class="line">---</div>
    <div class="line">Elle observe.</div>
    <div class="line">Toujours.</div>
    <div class="line">---</div>
    <div class="line">Chargement du visuel...</div>
</div>

<!-- IMAGE qui apparaît à la fin -->
<img id="finalImage" src="chef.png" alt="Chef du culte">

<script>
const lines = document.querySelectorAll(".line");
const image = document.getElementById("finalImage");

// Apparition des lignes
lines.forEach((line, index) => {
    setTimeout(() => {
        line.style.opacity = 1;
    }, index * 1200);
});

// Apparition de l'image à la fin
setTimeout(() => {
    image.style.opacity = 1;
}, lines.length * 1200 + 500);
</script>

</body>
</html>
