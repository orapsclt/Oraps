<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accès</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

#countdown {
    font-size: 60px;
    margin-bottom: 40px;
    letter-spacing: 5px;
}

input {
    background: transparent;
    border: 1px solid white;
    color: white;
    padding: 10px;
    text-align: center;
    outline: none;
    width: 200px;
}

input::placeholder {
    color: gray;
}
</style>
</head>

<body>

<div id="countdown">00:10:00</div>
<input type="text" id="codeInput" placeholder="entrer le code..." />

<script>
// 🔑 CODES
const codes = {
    "niche.": "gentils.html",
    "oraps3": "mechants.html",
    "9204": "sujet1.html",
    "creatrice.clt": "chef.html"
};

// ⏳ COMPTE À REBOURS (10 minutes)
let time = 600;

function updateCountdown() {
    let m = Math.floor(time / 60);
    let s = time % 60;

    document.getElementById("countdown").textContent =
        String(m).padStart(2, '0') + ":" +
        String(s).padStart(2, '0');

    time--;
    if (time >= 0) {
        setTimeout(updateCountdown, 1000);
    }
}

updateCountdown();

// 🔐 SYSTÈME DE CODE
document.getElementById("codeInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        let value = this.value.trim();

        if (codes[value]) {
            window.location.href = codes[value];
        } else {
            this.value = "";
            this.placeholder = "code invalide...";
        }
    }
});
</script>

</body>
</html>
