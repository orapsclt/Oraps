<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sujet numéro 1</title>

<style>
body {
    background: black;
    color: white;
    font-family: monospace;
    padding: 40px;
}

/* Lignes cachées au début */
.line {
    opacity: 0;
    margin-bottom: 12px;
    transition: opacity 0.8s;
}

/* Titre */
h1 {
    color: #ccc;
    margin-bottom: 30px;
}

/* IMAGE visible direct */
img {
    display: block;
    margin-bottom: 30px;
    max-width: 300px;
    border: 1px solid #444;
}

/* Curseur */
.cursor::after {
    content: "_";
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}
</style>
</head>

<body>

<h1 class="cursor">Sujet numéro 1</h1>

<!-- IMAGE visible dès le début -->
<img src="Sujet1.png" alt="Sujet">

<div id="content">
    <div class="line">Initialisation du dossier...</div>
    <div class="line">Connexion au système...</div>
    <div class="line">Accès accordé.</div>
    <div class="line">---</div>
    <div class="line">Nom : Thomas</div>
    <div class="line">Âge : 14 ans</div>
    <div class="line">Pseudo : flynxs_</div>
    <div class="line">Statut : Sous surveillance</div>
    <div class="line">---</div>
    <div class="line">Fin du rapport.</div>
</div>

<script>
const lines = document.querySelectorAll(".line");

lines.forEach((line, index) => {
    setTimeout(() => {
        line.style.opacity = 1;
    }, index * 1200);
});
</script>

</body>
</html>
