<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accès alternatif</title>

<style>
body {
    background: black;
    color: red;
    font-family: monospace;
    padding: 40px;
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); }
    50% { transform: translate(2px, -2px); }
    100% { transform: translate(-2px, 2px); }
}
</style>
</head>

<body>

<h1>ILS T'ONT TROUVÉ</h1>

<p>
Tu n'étais pas censé voir ceci.
</p>

<p>
Mais maintenant que tu es là… il n’y a plus de retour.
</p>

<p>
Mission : perturber les autres joueurs.
Cache les indices. Déforme la vérité.
</p>

</body>
</html>
