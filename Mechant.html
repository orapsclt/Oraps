<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bienvenue dans le culte</title>

    <style>
        body {
            background: black;
            color: red;
            font-family: monospace;
            padding: 40px;
            /* L'animation glitch peut être intense, ajuste au besoin */
            animation: glitch 0.2s infinite;
            overflow-x: hidden;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            50% { transform: translate(2px, -2px); }
            100% { transform: translate(-2px, 2px); }
        }

        /* Style pour le curseur clignotant */
        .cursor {
            border-right: 10px solid red;
            animation: blink 0.7s infinite;
            margin-left: 5px;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        p, h1 {
            min-height: 1.2em; /* Évite que la page saute quand le texte apparaît */
        }
    </style>
</head>

<body>

    <h1 id="titre"></h1>
    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>

    <script>
        const texts = [
            { id: "titre", content: "NOUS T'AVONS TROUVÉ" },
            { id: "p1", content: "TU FAIS OFFICIELLEMENT PARTIE DE ORAPS." },
            { id: "p2", content: "Mais maintenant que tu es là... il n'y a plus de retour." },
            { id: "p3", content: "Mission : envoyez votre nom, pseudo et photo sur l'émail oraps.recrutement@gmail.com" }
        ];

        let textIndex = 0;
        let charIndex = 0;

        function typeWriter() {
            if (textIndex < texts.length) {
                // On récupère l'objet actuel (id + contenu)
                let currentItem = texts[textIndex];
                let element = document.getElementById(currentItem.id);

                if (charIndex < currentItem.content.length) {
                    // On ajoute un caractère
                    element.innerHTML += currentItem.content.charAt(charIndex);
                    charIndex++;
                    // Vitesse de frappe (50ms)
                    setTimeout(typeWriter, 50); 
                } else {
                    // Fin du texte actuel, on passe au suivant après une pause
                    textIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 800); // Pause entre les paragraphes (800ms)
                }
            }
        }

        // Lancer l'animation au chargement de la page
        window.onload = typeWriter;
    </script>
</body>
</html>,
