<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Message</title>

<style>
body {
    background: black;
    color: #c00;
    font-family: monospace;
    padding: 40px;
}

/* Texte caché au début */
.line {
    opacity: 0;
    margin-bottom: 20px;
    transition: opacity 1s;
}

/* Lien fichier */
.file {
    opacity: 0;
    margin-top: 30px;
    transition: opacity 1s;
}

a {
    color: #c00;
    text-decoration: none;
}

a:hover {
    text-shadow: 0 0 5px red;
}
</style>
</head>

<body>

<h1 class="line">Accès caché détecté</h1>

<p class="line">Lecture du message requise...</p>
<p class="line">Lis mon message.</p>

<div class="file" id="file">
    📄 <a href="message1.docx" target="_blank">message1.docx</a>
</div>

<script>
const lines = document.querySelectorAll(".line");
const file = document.getElementById("file");

// Texte qui apparaît
lines.forEach((line, index) => {
    setTimeout(() => {
        line.style.opacity = 1;
    }, index * 1200);
});

// Fichier qui apparaît après
setTimeout(() => {
    file.style.opacity = 1;
}, lines.length * 1200 + 1000);
</script>

</body>
</html>
