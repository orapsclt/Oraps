<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès autorisé</title>

    <style>
        body {
            background: #050505;
            color: #00ffcc; /* Cyan/bleu terminal */
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            font-size: 1.1em;
            line-height: 1.5;
        }

        h1 {
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        /* Effet de curseur clignotant uniquement sur l'élément en cours */
        .typing::after {
            content: "|";
            font-weight: bold;
            color: #00ffcc;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
        
        /* Pour s'assurer que l'email ressorte bien */
        .email-highlight {
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1 id="titre"></h1>
    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>
    <p id="p4"></p> <script>
        const sequence = [
            { id: "titre", text: "ACCÈS AUTORISÉ" },
            { id: "p1", text: "Si tu lis ceci, c’est que tu fais partie des rares à avoir trouvé le bon chemin." },
            { id: "p2", text: "Ils observent. Toujours." },
            { id: "p3", text: "Ton objectif commence maintenant.\nAIDE MOI À DETRUIRE LE CULTE, je t'en supplie.. il nous reste plus beaucoup de temps...\nreviens sur ce site dans environ 1 jours.\nun bouton sera caché clique dessus!" },
            { id: "p4", text: "POUR CONFIRMER QUE TU ES AVEC MOI : envoie ton nom, pseudo et photo sur l'émail anti.oraps@gmail.com" }
        ];

        let seqIndex = 0;
        let charIndex = 0;

        function typeEffect() {
            if (seqIndex < sequence.length) {
                const current = sequence[seqIndex];
                const element = document.getElementById(current.id);
                
                // On active le curseur sur la ligne actuelle
                element.classList.add('typing');

                if (charIndex < current.text.length) {
                    const charToAdd = current.text.charAt(charIndex);
                    
                    if (charToAdd === '\n') {
                        element.innerHTML += '<br>'; 
                    } else {
                        element.innerHTML += charToAdd;
                    }
                    
                    charIndex++;
                    setTimeout(typeEffect, 40); 
                } else {
                    // On retire le curseur dès que la ligne est finie
                    element.classList.remove('typing');
                    seqIndex++;
                    charIndex = 0;
                    setTimeout(typeEffect, 800); // Pause un peu plus longue avant l'instruction finale
                }
            }
        }

        window.onload = typeEffect;
    </script>

</body>
</html>
